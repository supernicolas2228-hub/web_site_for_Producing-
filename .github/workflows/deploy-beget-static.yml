# После добавления секретов (см. конец файла) каждый push в main собирает статику и выкладывает на Beget.
name: Deploy static to Beget

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-beget-static
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export (Beget)
        env:
          BEGET_STATIC: "1"
          NEXT_PUBLIC_STATIC_EXPORT: "1"
          NEXT_PUBLIC_SITE_URL: https://sanchaevkirill.ru
          NEXT_PUBLIC_DEPLOY_REF: ${{ github.sha }}
          NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
          DATABASE_URL: file:./dev.db
          NODE_OPTIONS: --max-old-space-size=8192
        run: node scripts/build-beget-static.cjs

      - name: Pack out/
        run: tar -czf beget-out.tar.gz -C out .

      # Не используем webfactory/ssh-agent — часто падает при пустом секрете или неверном формате ключа.
      - name: Check Action secrets for deploy
        env:
          KEY: ${{ secrets.BEGET_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.BEGET_SSH_HOST }}
          USER: ${{ secrets.BEGET_SSH_USER }}
        run: |
          set -e
          ERR=""
          [ -z "${KEY:-}" ] && ERR="${ERR} BEGET_SSH_PRIVATE_KEY"
          [ -z "${HOST:-}" ] && ERR="${ERR} BEGET_SSH_HOST"
          [ -z "${USER:-}" ] && ERR="${ERR} BEGET_SSH_USER"
          if [ -n "$ERR" ]; then
            echo "::error title=Нет секретов для SSH::Добавьте в GitHub → Settings → Secrets and variables → Actions:${ERR}"
            echo "::notice::Создайте ключ без пароля: ssh-keygen -t ed25519 -f beget_ci -N \"\" и добавьте beget_ci.pub в панели Beget"
            exit 1
          fi

      - name: Install SSH key file (без ssh-agent)
        env:
          BEGET_SSH_PRIVATE_KEY: ${{ secrets.BEGET_SSH_PRIVATE_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$BEGET_SSH_PRIVATE_KEY" > ~/.ssh/beget_github_actions
          chmod 600 ~/.ssh/beget_github_actions
          grep -q "BEGIN " ~/.ssh/beget_github_actions || {
            echo "::error::BEGET_SSH_PRIVATE_KEY должен содержать строку -----BEGIN … PRIVATE KEY-----"
            exit 4
          }

      - name: Trust Beget host key
        env:
          BEGET_SSH_HOST: ${{ secrets.BEGET_SSH_HOST }}
        run: |
          set -e
          mkdir -p ~/.ssh
          ssh-keyscan -H "$BEGET_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload tarball
        env:
          TARGET: ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }}
        run: |
          set -e
          scp -i ~/.ssh/beget_github_actions -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            beget-out.tar.gz "${TARGET}:~/beget-out.tar.gz"

      - name: Unpack to public_html
        env:
          TARGET: ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }}
        run: |
          set -e
          ssh -i ~/.ssh/beget_github_actions -o IdentitiesOnly=yes "$TARGET" 'set -e
          for d in "$HOME/supernh5.beget.tech/public_html" "$HOME/sanchaevkirill.ru/public_html"; do
            mkdir -p "$d"
            rm -rf "${d:?}"/*
            tar -xzf "$HOME/beget-out.tar.gz" -C "$d"
            echo "ok: $d"
          done
          rm -f "$HOME/beget-out.tar.gz"'

# Обязательные секреты (Settings → Secrets and variables → Actions → Repository secrets):
#   BEGET_SSH_PRIVATE_KEY — ВЕСЬ приватный ключ одним блоком (BEGIN OPENSSH PRIVATE KEY … END …), без кавычек.
#   BEGET_SSH_HOST        — только хост, например u123456.freeshell.beget.tech (без user@ и без ssh://)
#   BEGET_SSH_USER        — логин SSH с Beget (раздел «SSH-доступ» в панели).
# Ключ должен быть БЕЗ пароля (passphrase), иначе CI не сможет им воспользоваться.
