# Собирает статику для sanchaevkirill.ru (out/) и при настроенных секретах выкладывает на Beget по SSH.
# Секреты (Settings → Secrets and variables → Actions):
#   BEGET_SSH_PRIVATE_KEY  — личный ключ (как id_ed25519)
#   BEGET_SSH_USER         — логин Beget (например u1234567)
#   BEGET_SSH_HOST         — хост (например u1234567.freeshell.beget.tech)
# Без секретов — только артефакт, можно скачать и вручную залить public_html.
name: Beget static

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: beget-static-${{ github.ref }}
  cancel-in-progress: true

jobs:
  out-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Static export (BEGET_STATIC)
        env:
          NEXT_PUBLIC_SITE_URL: https://sanchaevkirill.ru
          NEXT_PUBLIC_STATIC_EXPORT: "1"
          NEXT_PUBLIC_DEPLOY_REF: "ci-${{ github.run_id }} / ${{ github.sha }}"
        run: node scripts/build-beget-static.cjs

      - name: Upload out/ as artifact
        uses: actions/upload-artifact@v4
        with:
          name: beget-out
          path: out
          if-no-files-found: error
          retention-days: 14

      - name: Pack tarball
        run: tar -czf beget-out.tar.gz -C out .

      - name: Optional deploy to Beget (SSH)
        env:
          BEGET_KEY: ${{ secrets.BEGET_SSH_PRIVATE_KEY }}
          BEGET_USER: ${{ secrets.BEGET_SSH_USER }}
          BEGET_HOST: ${{ secrets.BEGET_SSH_HOST }}
        run: |
          set -e
          if [ -z "${BEGET_KEY:-}" ] || [ -z "${BEGET_USER:-}" ] || [ -z "${BEGET_HOST:-}" ]; then
            echo "::warning::Beget: не заданы BEGET_SSH_PRIVATE_KEY / BEGET_SSH_USER / BEGET_SSH_HOST — залейте вручную из артефакта beget-out."
            exit 0
          fi
          mkdir -p ~/.ssh
          eval "$(ssh-agent -s)"
          echo "$BEGET_KEY" | tr -d '\r' | ssh-add -
          ssh-keyscan -H "$BEGET_HOST" >> ~/.ssh/known_hosts
          scp -o BatchMode=yes -o IdentitiesOnly=yes beget-out.tar.gz "${BEGET_USER}@${BEGET_HOST}:~/"
          ssh -o BatchMode=yes -o IdentitiesOnly=yes "${BEGET_USER}@${BEGET_HOST}" \
            'for d in "$HOME/supernh5.beget.tech/public_html" "$HOME/sanchaevkirill.ru/public_html"; do mkdir -p "$d" && rm -rf "$d"/* && tar -xzf "$HOME/beget-out.tar.gz" -C "$d" && echo "unpacked: $d"; done; rm -f "$HOME/beget-out.tar.gz"'
          echo "Beget deploy done."
