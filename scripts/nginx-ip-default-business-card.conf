# Пример для nginx: по IP (порт 80) — сайт Кирилла из PM2 (Next слушает 3000).
# Скопируйте в /etc/nginx/sites-available/ (имя на ваше усмотрение), сделайте symlink в sites-enabled,
# снимите default_server с другого проекта, затем: nginx -t && systemctl reload nginx
#
# Путь приложения в деплое: /var/www/business-card-site, PM2: business-card-site, PORT: 3000

# Публичный сайт: не используйте `allow` по IP в этом server — иначе отрежете гостей с VPN/датацентров.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
