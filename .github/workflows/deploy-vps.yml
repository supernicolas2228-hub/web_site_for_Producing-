# После добавления секретов (см. конец файла) каждый push в main деплоит на VPS.
# Не используем webfactory/ssh-agent — при пустом секрете или PR из форка он падает с «ssh-private-key is empty».
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Секреты GitHub не передаются в workflow для pull_request из форка — такой запуск пропускаем.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create tarball
        run: |
          tar czf /tmp/site.tgz \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=.git \
            --exclude=.env \
            --exclude='*.db' \
            -C "$GITHUB_WORKSPACE" .

      - name: Check Action secrets for deploy
        env:
          KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
        run: |
          set -e
          ERR=""
          [ -z "${KEY:-}" ] && ERR="${ERR} VPS_SSH_PRIVATE_KEY"
          [ -z "${HOST:-}" ] && ERR="${ERR} VPS_HOST"
          [ -z "${USER:-}" ] && ERR="${ERR} VPS_USER"
          if [ -n "$ERR" ]; then
            echo "::error title=Нет секретов для SSH::Добавьте в GitHub → Settings → Secrets and variables → Actions:${ERR}"
            echo "::notice::Ключ без пароля: ssh-keygen -t ed25519 -f vps_ci -N \"\" ; публичный ключ — в ~/.ssh/authorized_keys на сервере"
            exit 1
          fi

      - name: Install SSH key file
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/vps_github_actions
          chmod 600 ~/.ssh/vps_github_actions
          grep -q "BEGIN " ~/.ssh/vps_github_actions || {
            echo "::error::VPS_SSH_PRIVATE_KEY должен содержать строку -----BEGIN … PRIVATE KEY-----"
            exit 4
          }

      - name: Trust host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -e
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload archive and install script
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -e
          TARGET="${VPS_USER}@${VPS_HOST}"
          scp -i ~/.ssh/vps_github_actions -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            /tmp/site.tgz "${TARGET}:~/sell-is-life-deploy.tgz"
          scp -i ~/.ssh/vps_github_actions -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$GITHUB_WORKSPACE/scripts/vps-remote-install.sh" "${TARGET}:/tmp/vps-remote-install.sh"
          scp -i ~/.ssh/vps_github_actions -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$GITHUB_WORKSPACE/scripts/vps-ensure-public-ingress.sh" "${TARGET}:/tmp/vps-ensure-public-ingress.sh"

      - name: Extract, build, pm2
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -e
          ssh -i ~/.ssh/vps_github_actions -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "chmod +x /tmp/vps-remote-install.sh /tmp/vps-ensure-public-ingress.sh && \
             export DEST='/var/www/business-card-site' PM2_NAME='business-card-site' ARCHIVE=\$HOME/sell-is-life-deploy.tgz PORT=3000 && \
             bash /tmp/vps-remote-install.sh && \
             rm -f /tmp/vps-remote-install.sh"

# Обязательные секреты (Settings → Secrets and variables → Actions):
#   VPS_SSH_PRIVATE_KEY — весь приватный ключ одним блоком (BEGIN OPENSSH PRIVATE KEY … END …), без кавычек, без пароля.
#   VPS_HOST            — IP или хост, например 138.124.90.218
#   VPS_USER            — например root
# Если путь приложения или имя PM2 другие — правьте DEST / PM2_NAME в шаге Extract выше.
